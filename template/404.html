{% extends 'base.html' %}
{% load static %}

{% block title %} 404 - Page Not Found {% endblock %}

{% block content %}
<div class="error-page-wrapper">
    <div class="container">
        <div class="row">
            <div class="col s12">
                <div class="lottie-container">
                    <lottie-player 
                        src="{% static 'lottie/404.json' %}" 
                        background="transparent" 
                        speed="1" 
                        style="width: 100%; height: 100%;" 
                        loop 
                        autoplay>
                    </lottie-player>
                </div>
                
                <h1 class="error-title">Oops! Lost in Space?</h1>
                <p class="error-text">
                    The page you are looking for might have been removed or is temporarily unavailable. 
                    Let's get you back on track!
                </p>
                
                <div class="error-actions">
                    <a href="/home" class="btn-large pulse bg-primary">
                        <i class="material-icons left">home</i> Return Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Force non-scrollable full screen */
    html, body {
        height: 100%;
        margin: 0;
        overflow: hidden !important;
    }

    .error-page-wrapper {
        height: 100vh;
        width: 100vw;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        background-color: #f8fafc;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9999;
    }

    .lottie-container {
        max-width: 500px;
        margin: 0 auto;
        height: 350px;
    }

    .error-title {
        font-family: var(--font-heading);
        font-weight: 900;
        color: #1e293b;
        margin: 0;
        font-size: 3.5rem;
        line-height: 1.2;
    }

    .error-text {
        font-size: 1.2rem;
        color: #64748b;
        max-width: 500px;
        margin: 1rem auto 2rem;
        line-height: 1.6;
    }

    .error-actions {
        display: flex;
        justify-content: center;
    }

    .error-actions .btn-large {
        border-radius: 100px;
        padding: 0 40px;
        font-weight: 700;
        text-transform: none;
        box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4);
    }

    /* Mobile adjustments */
    @media (max-width: 600px) {
        .error-title { font-size: 2.5rem; }
        .lottie-container { height: 250px; }
    }
</style>

<script>
    // Ensure no scrolling on this page
    document.body.style.overflow = 'hidden';
</script>
{% endblock %}
