{% extends 'base.html' %}
{% load static %}

{% block title %} Photography - BLOGS {% endblock %}

{% block content %}
<link rel="stylesheet" type="text/css" href="{% static 'photography.css' %}">
<link rel="stylesheet" type="text/css" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<div class="photography-wrapper" style="font-family: var(--font-main);">
    <header class="header" style="height: 60vh; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; position: relative;">
        <div class="h-text center-align" style="z-index: 10; color: white;">
            <i class="fa fa-camera" style="font-size: 3rem; margin-bottom: 20px;"></i>
            <h1 data-aos="zoom-in-down" style="font-family: var(--font-heading); font-size: 3.5rem; max-width: 800px;">Capturing the moments that captivate your heart.</h1>
        </div>
        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4);"></div>
    </header>

    <section class="filter-gallery" style="padding: 5rem 0;">
        <div class="container">
            <div class="portfolio-menu center-align" style="margin-bottom: 3rem;">
                <ul style="display: flex; justify-content: center; gap: 20px; list-style: none;">
                    <li data-filter="*" class="btn active" style="border-radius: 20px;">All</li>
                    <li data-filter=".web" class="btn" style="border-radius: 20px;">Nature</li>
                    <li data-filter=".seo" class="btn" style="border-radius: 20px;">Fashion</li>
                </ul>
            </div>
            <div class="portfolio-item row">
                <div class="item web col s12 m6 l4" data-aos="flip-left" style="margin-bottom: 20px;">
                    <img src="{% static 'images/p1.jpg' %}" class="responsive-img" style="border-radius: var(--border-radius); box-shadow: var(--shadow);">
                </div>
                <div class="item web col s12 m6 l4" data-aos="flip-left" style="margin-bottom: 20px;">
                    <img src="{% static 'images/p2.jpg' %}" class="responsive-img" style="border-radius: var(--border-radius); box-shadow: var(--shadow);">
                </div>
                <div class="item web col s12 m6 l4" data-aos="flip-left" style="margin-bottom: 20px;">
                    <img src="{% static 'images/p3.jpg' %}" class="responsive-img" style="border-radius: var(--border-radius); box-shadow: var(--shadow);">
                </div>
                <div class="item web col s12 m6 l4" data-aos="flip-left" style="margin-bottom: 20px;">
                    <img src="{% static 'images/p4.jpg' %}" class="responsive-img" style="border-radius: var(--border-radius); box-shadow: var(--shadow);">
                </div>
                <div class="item seo col s12 m6 l4" data-aos="zoom-in" style="margin-bottom: 20px;">
                    <img src="{% static 'images/p5.jpg' %}" class="responsive-img" style="border-radius: var(--border-radius); box-shadow: var(--shadow);">
                </div>
                <div class="item seo col s12 m6 l4" data-aos="zoom-in" style="margin-bottom: 20px;">
                    <img src="{% static 'images/p6.jpg' %}" class="responsive-img" style="border-radius: var(--border-radius); box-shadow: var(--shadow);">
                </div>
                <div class="item graphics col s12 m6 l4" data-aos="zoom-in-up" style="margin-bottom: 20px;">
                    <img src="{% static 'images/p7.jpg' %}" class="responsive-img" style="border-radius: var(--border-radius); box-shadow: var(--shadow);">
                </div>
                <div class="item graphics col s12 m6 l4" data-aos="zoom-in-up" style="margin-bottom: 20px;">
                    <img src="{% static 'images/p8.jpg' %}" class="responsive-img" style="border-radius: var(--border-radius); box-shadow: var(--shadow);">
                </div>
                <div class="item graphics col s12 m6 l4" data-aos="zoom-in-up" style="margin-bottom: 20px;">
                    <img src="{% static 'images/p9.jpg' %}" class="responsive-img" style="border-radius: var(--border-radius); box-shadow: var(--shadow);">
                </div>
                <div class="item graphics col s12 m6 l4" data-aos="zoom-in-up" style="margin-bottom: 20px;">
                    <img src="{% static 'images/pexels-lucasallmann-612891.jpg' %}" class="responsive-img" style="border-radius: var(--border-radius); box-shadow: var(--shadow);">
                </div>
                <div class="item graphics col s12 m6 l4" data-aos="zoom-in-up" style="margin-bottom: 20px;">
                    <img src="{% static 'images/pexels-kelly-1179532-2918152.jpg' %}" class="responsive-img" style="border-radius: var(--border-radius); box-shadow: var(--shadow);">
                </div>
                <div class="item graphics col s12 m6 l4" data-aos="zoom-in-up" style="margin-bottom: 20px;">
                    <img src="{% static 'images/pexels-nandhukumar-450441.jpg' %}" class="responsive-img" style="border-radius: var(--border-radius); box-shadow: var(--shadow);">
                </div>
            </div>

            <!-- Member Cards Section -->
            <div class="member-card center-align" data-aos="zoom-in-down" style="margin-top: 5rem; display: flex; justify-content: center; gap: 30px; flex-wrap: wrap;">
                <img src="{% static 'images/icon1.png' %}" width="100">
                <img src="{% static 'images/icon2.png' %}" width="100">
                <img src="{% static 'images/icon3.png' %}" width="100">
                <img src="{% static 'images/icon4.png' %}" width="100">
            </div>

            <!-- More Images Section -->
            <div class="m-images center-align" data-aos="zoom-in" style="margin-top: 5rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                <img src="{% static 'images/s1.jpg' %}" class="responsive-img" style="border-radius: 10px;">
                <img src="{% static 'images/s2.jpg' %}" class="responsive-img" style="border-radius: 10px;">
                <img src="{% static 'images/s3.jpg' %}" class="responsive-img" style="border-radius: 10px;">
                <img src="{% static 'images/s4.jpg' %}" class="responsive-img" style="border-radius: 10px;">
                <img src="{% static 'images/s5.jpg' %}" class="responsive-img" style="border-radius: 10px;">
                <img src="{% static 'images/s6.jpg' %}" class="responsive-img" style="border-radius: 10px;">
            </div>
        </div>
    </section>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://unpkg.com/isotope-layout@3/dist/isotope.pkgd.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
	$(document).ready(function(){
		$('.portfolio-item').isotope({
			itemSelector: '.item',
			layoutMode: 'fitRows'
		});
		$('.portfolio-menu ul li').click(function(){
			$('.portfolio-menu ul li').removeClass('active');
			$(this).addClass('active');
			var selector = $(this).attr('data-filter');
			$('.portfolio-item').isotope({
				filter: selector
			});
			return false;
		});
		AOS.init();
	});
</script>
{% endblock %}
