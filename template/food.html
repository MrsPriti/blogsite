{% extends 'base.html' %}
{% load static %}

{% block title %} Recipes - BLOGS {% endblock %}

{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css" />
<link rel="stylesheet" href="{% static 'food.css' %}" />

<div class="food-wrapper" style="font-family: var(--font-main); padding: 5rem 0;">
    <div class="container">
      <div class="meal-wrapper">
        <div class="meal-search center-align" style="margin-bottom: 4rem;">
          <h2 class="title" style="font-family: var(--font-heading); font-size: 4rem; color: #1e293b;">Delicious Recipes</h2>
          <blockquote style="border-left: 5px solid var(--primary); font-family: var(--font-alt); font-size: 1.2rem; color: #64748b;">
            "Real food doesn't have ingredients, real food is ingredients."
          </blockquote>

          <div class="meal-search-box" style="max-width: 600px; margin: 30px auto; display: flex;">
            <input type="text" class="search-control" placeholder="Enter an ingredient (e.g. Potato, Chicken)" id="search-input" style="height: 50px; border-radius: 25px 0 0 25px; border: 2px solid #e2e8f0; padding: 0 25px;">
            <button type="submit" class="search-btn btn bg-primary" id="search-btn" style="height: 50px; border-radius: 0 25px 25px 0; padding: 0 30px;">
              <i class="fas fa-search"></i>
            </button>
          </div>
        </div>

        <div class="meal-result">
          <h2 class="title" style="font-family: var(--font-heading); margin-bottom: 30px;">Your Search Results:</h2>
          <div id="meal" class="row">
            <!-- meal items will be injected here by food.js -->
          </div>
        </div>

        <div class="meal-details glass-morphism" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; width: 90%; max-width: 800px; max-height: 90vh; overflow-y: auto; background: white; padding: 40px; border-radius: var(--border-radius); box-shadow: var(--shadow-lg);">
          <button type="button" class="btn recipe-close-btn" id="recipe-close-btn" style="position: absolute; top: 20px; right: 20px; background: #ef4444; border-radius: 50%; width: 40px; height: 40px; padding: 0;">
            <i class="fas fa-times"></i>
          </button>
          <div class="meal-details-content">
            <!-- content injected by food.js -->
          </div>
        </div>
      </div>
    </div>
</div>

<script src="{% static 'food.js' %}"></script>
{% endblock %}
