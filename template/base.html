<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} {% endblock %}</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css'%}">
    <link rel="stylesheet" href="{% static '/owl.carousel.min.css'%}">
    <link rel="stylesheet" href="{% static '/owl.theme.default.min.css'%}">

    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --accent: #06b6d4;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-dark: rgba(15, 23, 42, 0.8);
            --font-main: 'Inter', sans-serif;
            --font-heading: 'Playfair Display', serif;
            --font-alt: 'Outfit', sans-serif;
        }
        body {
            font-family: var(--font-main);
            background-color: #f8fafc;
            color: #1e293b;
            line-height: 1.6;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
            font-weight: 800;
        }
        .bg-primary {
            background: var(--primary) !important;
        }
    </style>
            
</head>
<body>
    
    {% include 'header.html'%}

    {% block content %}

    {% endblock %}
    {% include 'footer.html' %}
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script>
        M.AutoInit();
        window.addEventListener('scroll', function() {
            const nav = document.querySelector('nav');
            if (window.scrollY > 50) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });
    </script>
    <script src="{% static '/owl.carousel.min.js'%}"></script>
    
    <script>
        $(document).ready(function(){
      $(".owl-carousel").owlCarousel(
      {
        loop: true,
    
          autoplay: true,
    
          nav: false,
          responsiveClass: true,
        responsive:{
            0:{
                items:1,
                nav:true
            },
            600:{
                items:3,
                nav:false
            },
            1000:{
                items:3,
                nav:true,
                loop:false
            }
        }
    
      }
      );
    });
    
    
    
    
    </script>

    
</body>
</html>
